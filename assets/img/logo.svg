<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-label="Tatiya CPA - CPAs You Can Turn To Year-round - Tax, Accounting, Advisory">
  <defs>
    <style>
      .navy { fill: #0a2c66; }
      .teal { fill: #1aa3b2; }
      .navy-stroke { stroke: #0a2c66; fill: none; stroke-width: 8; stroke-linecap: round; }
      .teal-stroke { stroke: #1aa3b2; fill: none; stroke-width: 8; stroke-linecap: round; }
      .wordmark { font-family: "Merriweather", "Times New Roman", serif; font-weight: 700; }
      .tag { font-family: "Merriweather", "Times New Roman", serif; font-style: italic; font-weight: 700; fill: #0a2c66; }
      .pillars { font-family: "Inter", Arial, sans-serif; font-weight: 600; fill: #0a2c66; letter-spacing: 4px; }
    </style>
  </defs>

  <!-- Wave: two arcs swooping right (centered, with side margins) -->
  <path class="navy-stroke" d="M 140 80 C 290 30, 510 30, 690 95" />
  <path class="teal-stroke" d="M 170 110 C 320 60, 530 60, 705 120" />

  <!-- Wordmark: TATIYA (navy) CPA (teal) -->
  <text x="400" y="220" class="wordmark" font-size="100" text-anchor="middle">
    <tspan class="navy">TATIYA </tspan><tspan class="teal">CPA</tspan>
  </text>

  <!-- Tagline rule + dots -->
  <line x1="160" y1="262" x2="225" y2="262" stroke="#1aa3b2" stroke-width="3" />
  <line x1="575" y1="262" x2="640" y2="262" stroke="#1aa3b2" stroke-width="3" />
  <text x="400" y="270" class="tag" font-size="26" text-anchor="middle">CPAs You Can Turn To Year-round</text>

  <!-- Pillars: TAX • ACCOUNTING • ADVISORY -->
  <text x="400" y="315" class="pillars" font-size="22" text-anchor="middle">
    TAX <tspan fill="#1aa3b2">&#8226;</tspan> ACCOUNTING <tspan fill="#1aa3b2">&#8226;</tspan> ADVISORY
  </text>
</svg>
